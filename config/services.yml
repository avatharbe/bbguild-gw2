services:
    avathar.bbguildgw2.installer:
        class: avathar\bbguildgw2\game\gw2_installer
        arguments:
            - '@dbal.conn'
            - '@cache.driver'
            - '@config'
            - '@user'

    avathar.bbguildgw2.provider:
        class: avathar\bbguildgw2\game\gw2_provider
        arguments:
            - '@avathar.bbguildgw2.installer'
            - '@ext.manager'
        tags:
            - { name: bbguild.game_provider }
